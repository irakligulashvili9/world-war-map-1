<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; background: #010101; color: #00ff00; overflow: hidden; }
        #map { flex: 3.5; border-right: 1px solid #333; }
        #info-panel { flex: 1.5; padding: 15px; background: #050505; overflow-y: auto; display: flex; flex-direction: column; border-left: 2px solid #ffaa00; }
        h2 { color: #ffaa00; border-bottom: 2px solid #ffaa00; padding-bottom: 8px; font-size: 1.1em; text-transform: uppercase; margin-top: 0; }
        .strike-card { background: #0d0d0d; padding: 12px; border: 1px solid #ff4444; border-radius: 4px; margin-bottom: 12px; border-left: 5px solid #ff4444; }
        .usa-aid { border-left-color: #ffaa00 !important; border-color: #ffaa00 !important; }
        .status-tag { display: inline-block; padding: 2px 6px; background: #ff4444; color: #000; font-weight: bold; font-size: 0.65em; border-radius: 2px; margin-bottom: 8px; }
        .aid-tag { background: #ffaa00 !important; }
        .news-container { flex-grow: 1; border: 1px solid #222; background: #000; min-height: 380px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; filter: brightness(0.8) contrast(1.2); }
        .label-style { background: rgba(0,0,0,0.9); border: 1px solid #ff4444; color: #fff; padding: 1px 3px; font-size: 7px; border-radius: 2px; white-space: nowrap; }
        .usa-label { border-color: #ffaa00; color: #ffaa00; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info-panel">
        <h2>🛰️ Global Strategic Monitor</h2>
        <div id="details"><p style="color: #666; font-size: 0.8em;">აირჩიეთ კონფლიქტის ვექტორი ანალიზისთვის.</p></div>
        <div id="news-section" class="news-container" style="display:none;">
            <div id="news-frame-wrapper" style="height: 100%;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>

    <script>
        var map = L.map('map').setView([20, 0], 2.5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const usaPos = [38.9, -77.0]; // Washington D.C.

        const data = [
            // ევროპა & კავკასია
            { from: "რუსეთი", to: "უკრაინა", path: [[55.7, 37.6], [50.4, 30.5]], q: "Ukraine war US military aid", status: "ომი", aid: true, analysis: "აშშ ეხმარება უკრაინას HIMARS, ATACMS და ფინანსური პაკეტებით." },
            { from: "რუსეთი", to: "საქართველო", path: [[43.5, 39.5], [42.5, 41.5]], q: "US support Georgia occupation", status: "ოკუპაცია", aid: true, analysis: "აშშ მხარს უჭერს ტერიტორიულ მთლიანობას და თავდაცვისუნარიანობას." },
            { from: "სერბეთი", to: "ბოსნია", path: [[44.8, 20.4], [43.8, 18.4]], q: "US Bosnia policy", status: "დაძაბულობა", aid: true, analysis: "სანქციები სეპარატისტებზე." },
            
            // ახლო აღმოსავლეთი
            { from: "ირანი", to: "ისრაელი", path: [[32.6, 51.6], [32.0, 34.8]], q: "US military aid Israel news", status: "ესკალაცია", aid: true, analysis: "აშშ-ის პირდაპირი თავდაცვითი დახმარება (Iron Dome, THAAD)." },
            { from: "იემენი", to: "წითელი ზღვა", path: [[15.3, 44.2], [15.0, 42.0]], q: "US strikes Houthis", status: "ბლოკადა", aid: true, analysis: "აშშ-ის კოალიცია (Operation Prosperity Guardian) იცავს გემებს." },

            // აზია
            { from: "ჩინეთი", to: "ტაივანი", path: [[26.0, 119.3], [25.0, 121.5]], q: "US Taiwan arms sale news", status: "ბლოკადა", aid: true, analysis: "აშშ-ის შეიარაღება და სტრატეგიული თავშეკავება." },
            { from: "ფილიპინები", to: "ჩინეთი", path: [[14.5, 121.0], [15.5, 118.0]], q: "US Philippines defense treaty", status: "საზღვაო დავა", aid: true, analysis: "აშშ-ფილიპინების თავდაცვის ხელშეკრულება." },
            { from: "ჩრდ. კორეა", to: "სამხ. კორეა", path: [[39.0, 125.7], [37.5, 127.0]], q: "US South Korea military drill", status: "ბირთვული საფრთხე", aid: true, analysis: "აშშ-ის ბირთვული ქოლგა სამხრეთ კორეისთვის." },

            // სამხრეთ ამერიკა (სრული სია)
            { from: "ვენესუელა", to: "გაიანა", path: [[7.5, -66.5], [6.8, -59.5]], q: "US military exercise Guyana", status: "დაძაბულობა", aid: true, analysis: "აშშ ეხმარება გაიანას დაზვერვითა და წვრთნებით." },
            { from: "ეკვადორი", to: "ნარკო-ომი", path: [[-0.2, -78.5], [-2.2, -79.8]], q: "US aid Ecuador cartel war", status: "შიდა ომი", aid: true, analysis: "აშშ-ის უსაფრთხოების დახმარება კარტელების წინააღმდეგ." },
            { from: "კოლუმბია", to: "კარტელები", path: [[4.7, -74.0], [7.0, -73.0]], q: "US Colombia security aid", status: "პარტიზანული ომი", aid: true, analysis: "Plan Colombia-ს ფარგლებში მიმდინარე მხარდაჭერა." },
            { from: "პერუ", to: "შიდა დაპირისპირება", path: [[-12.0, -77.0], [-13.5, -72.0]], q: "Peru political crisis news", status: "კრიზისი", aid: false, analysis: "შიდა პოლიტიკური არასტაბილურობა და პროტესტები." },
            { from: "ბრაზილია", to: "საზღვარი", path: [[-15.8, -47.9], [-20.0, -55.0]], q: "Brazil border security news", status: "კონტროლი", aid: false, analysis: "ბრძოლა ტრანსსასაზღვრო კრიმინალთან." }
        ];

        function loadNews(query) {
            const wrapper = document.getElementById('news-frame-wrapper');
            document.getElementById('news-section').style.display = 'block';
            wrapper.innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(query)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(s => {
            const color = '#ff4444';
            // კონფლიქტის ხაზი
            var line = L.polyline(s.path, {color: color, weight: 2, opacity: 0.8, dashArray: '5, 5'}).addTo(map);
            
            // ამერიკის დახმარების ხაზი (ყვითელი)
            if (s.aid) {
                L.polyline([usaPos, s.path[1]], {color: '#ffaa00', weight: 1, opacity: 0.4, dashArray: '10, 10'}).addTo(map);
            }

            var ghost = L.polyline(s.path, {color: 'transparent', weight: 20, cursor: 'pointer'}).addTo(map);
            L.polylineDecorator(line, { patterns: [{offset: '100%', symbol: L.Symbol.arrowHead({pixelSize: 10, pathOptions: {color: color, fillOpacity: 1}})}] }).addTo(map);

            const action = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card ${s.aid ? 'usa-aid' : ''}">
                        <div class="status-tag">${s.status}</div>
                        ${s.aid ? '<div class="status-tag aid-tag">აშშ-ის მხარდაჭერა</div>' : ''}
                        <h3 style="color:#ff4444;margin:0;font-size:1em;">${s.from} ➔ ${s.to}</h3>
                        <p style="font-size:0.85em; margin-top:8px; line-height:1.4;">${s.analysis}</p>
                    </div>`;
                loadNews(s.q);
            };

            line.on('click', action); ghost.on('click', action);
            L.marker(s.path[0], {icon: L.divIcon({className: 'label-style', html: s.from})}).addTo(map);
        });

        // USA Marker
        L.marker(usaPos, {icon: L.divIcon({className: 'label-style usa-label', html: '🇺🇸 USA'})}).addTo(map);
    </script>
</body>
</html>
