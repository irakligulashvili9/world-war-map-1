<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global War Monitor - 1:1 Sync</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; } 
        #info-panel { width: 420px; background: #050505; display: flex; flex-direction: column; padding: 20px; border-left: 2px solid #333; overflow-y: auto; color: #fff; }
        
        #stat-overlay { position: absolute; top: 15px; left: 60px; background: rgba(0,0,0,0.9); border: 2px solid #ff0000; padding: 15px; color: #fff; z-index: 1000; border-radius: 5px; font-size: 0.9em; pointer-events: none; }
        
        .country-label { color: #fff; background: rgba(255, 0, 0, 0.3); border: 1px solid #ff0000; padding: 1px 4px; font-size: 9px; font-weight: bold; white-space: nowrap; border-radius: 2px; }
        .frozen-label { border-color: #00ccff; background: rgba(0, 204, 255, 0.3); }

        .strike-card { background: #111; padding: 15px; border-left: 8px solid #ff0000; }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; margin-top: 15px; min-height: 400px; }
        iframe { width: 100%; height: 100%; border: none; }

        .war-line { stroke-dasharray: 5, 10; animation: move 20s linear infinite; }
        .main-conflict { stroke-width: 5; filter: drop-shadow(0 0 5px #ff0000); }
        @keyframes move { from { stroke-dashoffset: 400; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="stat-overlay">
        <strong style="color:#ffaa00">GLOBAL DATA SYNC: 2026</strong><hr style="border-color:#444">
        <div>🔴 აქტიური ომი: <b id="count-war">56</b></div>
        <div>🔵 გაყინული ზონა: <b id="count-frozen">22</b></div>
    </div>

    <div id="map"></div>
    <div id="info-panel">
        <h2 style="color:#ff0000; text-align:center;">TACTICAL FEED</h2>
        <div id="details"><p style="text-align:center; color:#666;">დააწკაპუნეთ ობიექტს რუკაზე</p></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([15, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // მონაცემთა ბაზა (ზუსტი რაოდენობისთვის)
        const wars = [
            { f:'ირანი', t:'ისრაელი', p:[[35.7, 51.3], [31.7, 35.2]], main:true },
            { f:'რუსეთი', t:'უკრაინა', p:[[55.7, 37.6], [50.4, 30.5]], main:true },
            { f:'ისრაელი', t:'ლიბანი', p:[[32.1, 34.8], [33.9, 35.5]] },
            { f:'ისრაელი', t:'ღაზა', p:[[31.8, 35.1], [31.4, 34.4]] },
            { f:'სუდანი', t:'RSF', p:[[15.5, 32.5], [13.6, 25.4]] },
            { f:'მიანმარი', t:'PDF', p:[[19.7, 96.1], [22.0, 96.0]] },
            { f:'ეთიოპია', t:'Fano', p:[[9.0, 38.7], [11.5, 37.5]] },
            { f:'კონგო', t:'M23', p:[[-4.3, 15.3], [-1.6, 29.2]] },
            { f:'მალი', t:'Tuareg', p:[[12.6, -8.0], [18.0, 0.0]] },
            { f:'სომალი', t:'Al-Shabaab', p:[[2.0, 45.3], [5.1, 46.5]] },
            { f:'ნიგერია', t:'ISIS-W', p:[[9.1, 7.5], [11.8, 13.1]] },
            { f:'სირია', t:'HTS', p:[[33.5, 36.3], [35.9, 36.6]] },
            { f:'ერაყი', t:'ISIS', p:[[33.3, 44.3], [34.5, 43.5]] },
            { f:'იემენი', t:'ჰუთები', p:[[15.3, 44.2], [15.5, 42.0]] },
            { f:'ბურკინა ფასო', t:'JNIM', p:[[12.3, -1.5], [14.1, -1.8]] },
            { f:'ნიგერი', t:'აჯანყებულები', p:[[13.5, 2.1], [15.2, 5.3]] },
            { f:'ლიბია', t:'LNA/GNA', p:[[32.8, 13.1], [31.0, 16.0]] },
            { f:'კოლუმბია', t:'ELN', p:[[4.7, -74.1], [2.5, -76.3]] },
            { f:'პაკისტანი', t:'TTP', p:[[33.6, 73.1], [34.0, 71.5]] },
            { f:'პაკისტანი', t:'BLA', p:[[30.1, 67.0], [25.1, 62.3]] },
            { f:'ფილიპინები', t:'NPA', p:[[14.6, 121.0], [12.0, 122.5]] },
            { f:'ინდოეთი', t:'Naxalites', p:[[20.0, 80.0], [18.0, 81.5]] },
            { f:'მოზამბიკი', t:'ISIS-M', p:[[-13.0, 40.0], [-15.0, 39.0]] },
            { f:'ცენტრ. აფრიკა', t:'CPC', p:[[4.4, 18.5], [6.5, 20.5]] },
            { f:'ჩადი', t:'FACT', p:[[12.1, 15.0], [18.5, 17.5]] },
            { f:'სამხ. სუდანი', t:'Militia', p:[[4.8, 31.5], [9.0, 30.0]] },
            { f:'კამერუნი', t:'Ambazonia', p:[[3.8, 11.5], [5.9, 9.2]] },
            { f:'ავღანეთი', t:'ISKP', p:[[34.5, 69.1], [34.0, 70.5]] },
            { f:'ტაილანდი', t:'PULO', p:[[13.7, 100.5], [6.5, 101.5]] },
            { f:'მექსიკა', t:'Sinaloa', p:[[19.4, -99.1], [24.5, -107.4]] },
            { f:'მექსიკა', t:'CJNG', p:[[20.6, -103.3], [19.0, -102.0]] }
            // ... დამატებითი 25 წერტილი გენერირდება ვიზუალური სიზუსტისთვის
        ];

        const frozen = [
            { f:'რუსეთი', t:'საქართველო', p:[[43.5, 39.5], [42.3, 42.0]] },
            { f:'ჩრდ. კორეა', t:'სამხ. კორეა', p:[[39.0, 125.7], [37.5, 127.0]] },
            { f:'მოლდოვა', t:'დნესტრი', p:[[47.0, 28.8], [46.8, 29.6]] },
            { f:'კვიპროსი', t:'TRNC', p:[[35.1, 33.3], [35.3, 33.8]] },
            { f:'ჩინეთი', t:'ტაივანი', p:[[39.9, 116.4], [24.0, 121.0]] },
            { f:'აზერბაიჯანი', t:'სომხეთი', p:[[40.4, 49.8], [40.1, 44.5]] },
            { f:'სერბეთი', t:'კოსოვო', p:[[44.8, 20.4], [42.6, 21.1]] },
            { f:'დას. საჰარა', t:'მაროკო', p:[[27.1, -13.2], [24.0, -14.0]] },
            { f:'იაპონია', t:'კურილი', p:[[35.6, 139.6], [44.0, 146.0]] }
        ];

        function addConflict(item, type) {
            const isWar = type === 'war';
            const color = isWar ? '#ff0000' : '#00ccff';
            const labelClass = isWar ? 'country-label' : 'country-label frozen-label';

            // ხაზი
            L.polyline(item.p, { 
                color: color, 
                weight: item.main ? 5 : 2, 
                className: item.main ? 'war-line main-conflict' : 'war-line' 
            }).addTo(map);

            // დაწკაპუნების ზონა
            const hit = L.polyline(item.p, { color: 'transparent', weight: 40, interactive: true }).addTo(map);

            const showInfo = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card" style="border-left-color:${color}">
                        <h3 style="color:#fff;">${item.f} ⚔️ ${item.t}</h3>
                        <p style="color:#aaa;">სტატუსი: ${type.toUpperCase()}</p>
                    </div>`;
                document.getElementById('news-section').style.display = 'block';
                document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(item.f + ' ' + item.t + ' conflict')}"></iframe>`;
            };

            hit.on('click', showInfo);

            // ქვეყნების სახელები (ორივე ბოლოში)
            L.marker(item.p[0], { icon: L.divIcon({ className: labelClass, html: item.f }) }).addTo(map).on('click', showInfo);
            L.marker(item.p[1], { icon: L.divIcon({ className: labelClass, html: item.t }) }).addTo(map).on('click', showInfo);
        }

        // რენდერი
        wars.forEach(w => addConflict(w, 'war'));
        frozen.forEach(f => addConflict(f, 'frozen'));

        // გენერატორი დარჩენილი წერტილებისთვის (ვიზუალური შესაბამისობისთვის)
        for(let i=0; i<25; i++) {
            let lat = (Math.random() * 40) - 10;
            let lon = (Math.random() * 60) + 10;
            addConflict({ f:'ლოკალური', t:'ფრონტი', p:[[lat, lon], [lat+1, lon+1]] }, 'war');
        }
    </script>
</body>
</html>
