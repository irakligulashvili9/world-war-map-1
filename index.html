<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>War Monitor - Dual Vector</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; } 
        #info-panel { width: 420px; min-width: 320px; background: #050505; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 2000; color: #fff; border-left: 2px solid #222; }
        
        #stat-overlay { position: absolute; top: 15px; left: 60px; background: rgba(0,0,0,0.9); border: 1px solid #ff0000; padding: 15px; color: #fff; z-index: 1000; border-radius: 5px; font-size: 0.9em; pointer-events: none; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
        .dot-ref { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; border: 1px solid #000; }

        .strike-card { background: #0a0a0a; padding: 15px; border: 1px solid #333; border-left: 8px solid #ff0000; margin-bottom: 10px; }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; min-height: 450px; margin-top: 15px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ისრის თავის სტილი */
        .arrow-head { font-size: 18px; font-weight: bold; pointer-events: none; text-shadow: 0 0 5px #000; }
        .line-active { stroke-dasharray: 10, 10; animation: dash 30s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="stat-overlay">
        <strong style="color:#ffaa00; font-size: 1.1em;">WAR MONITOR 2026</strong><hr style="border:0; border-top:1px solid #444; margin: 10px 0;">
        <div class="legend-item"><div class="dot-ref" style="background:#ff0000"></div> აქტიური ომი (56)</div>
        <div class="legend-item"><div class="dot-ref" style="background:#ffa500"></div> ლოკალური შეტაკება (114)</div>
        <div class="legend-item"><div class="dot-ref" style="background:#00ccff"></div> გაყინული (22)</div>
    </div>

    <div id="map"></div>
    <div id="info-panel">
        <h2 style="color:#ff0000; text-align:center; border-bottom: 2px solid #ff0000; padding-bottom:10px;">TACTICAL DATA</h2>
        <div id="details"><p style="text-align:center; color:#888; margin-top:30px;">აირჩიეთ ფრონტის ხაზი</p></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([25, 25], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const colors = { war:'#ff0000', local:'#ffa500', frozen:'#00ccff' };

        // მონაცემთა ბაზა - 56+ წერტილისთვის
        const conflicts = [
            // 🔴 აქტიური ფრონტები (ორმხრივი ისრებით)
            { type:'war', f:'რუსეთი', t:'უკრაინა', p:[[55.7,37.6],[50.4,30.5]], q:'Ukraine war update' },
            { type:'war', f:'ირანი', t:'ისრაელი', p:[[35.7,51.3],[31.7,35.2]], q:'Iran Israel conflict' },
            { type:'war', f:'ისრაელი', t:'ლიბანი', p:[[32.0,34.8],[33.8,35.5]], q:'Israel Hezbollah war' },
            { type:'war', f:'ისრაელი', t:'ღაზა', p:[[31.7,35.2],[31.4,34.4]], q:'Gaza strip war' },
            { type:'war', f:'სუდანი', t:'RSF/SAF', p:[[15.5,32.5],[14.5,24.5]], q:'Sudan war' },
            { type:'war', f:'მიანმარი', t:'აჯანყებულები', p:[[19.7,96.1],[21.5,95.5]], q:'Myanmar conflict' },
            { type:'war', f:'სირია', t:'აჯანყებულები', p:[[33.5,36.3],[36.1,36.7]], q:'Syria civil war' },
            { type:'war', f:'ეთიოპია', t:'Fano', p:[[9.0,38.7],[11.3,37.3]], q:'Ethiopia conflict' },
            { type:'war', f:'კონგო', t:'M23/Rwanda', p:[[-4.3,15.3],[-1.6,29.2]], q:'Congo Rwanda tension' },
            { type:'war', f:'სომალი', t:'Al-Shabaab', p:[[2.0,45.3],[4.8,46.2]], q:'Somalia war' },
            { type:'war', f:'მალი', t:'Tuareg', p:[[12.6,-8.0],[18.2,-0.2]], q:'Mali war' },
            { type:'war', f:'ნიგერია', t:'Boko Haram', p:[[9.0,7.5],[11.8,13.2]], q:'Boko Haram' },
            
            // 🟠 შეტაკებები (Local)
            { type:'local', f:'აზერბაიჯანი', t:'სომხეთი', p:[[40.4,49.8],[40.1,44.5]], q:'Armenia Azerbaijan border' },
            { type:'local', f:'იემენი', t:'ჰუთები', p:[[15.3,44.2],[15.5,42.0]], q:'Houthi Red Sea' },
            { type:'local', f:'ინდოეთი', t:'პაკისტანი', p:[[28.6,77.2],[34.1,74.8]], q:'Kashmir conflict' },
            { type:'local', f:'ფილიპინები', t:'ჩინეთი', p:[[14.6,121.0],[10.2,117.8]], q:'South China Sea clash' },
            { type:'local', f:'მექსიკა', t:'კარტელები', p:[[19.4,-99.1],[24.5,-103.5]], q:'Mexico cartel war' },

            // 🔵 გაყინული (Frozen)
            { type:'frozen', f:'რუსეთი', t:'საქართველო', p:[[43.5,39.5],[42.3,42.0]], q:'Occupation Georgia' },
            { type:'frozen', f:'კორეა', t:'DMZ', p:[[37.5,127.0],[38.5,127.3]], q:'North Korea DMZ' },
            { type:'frozen', f:'მოლდოვა', t:'დნესტრი', p:[[47.0,28.8],[46.8,29.6]], q:'Transnistria' },
            { type:'frozen', f:'კვიპროსი', t:'TRNC', p:[[35.1,33.3],[35.4,33.8]], q:'Cyprus partition' },
            { type:'frozen', f:'ჩინეთი', t:'ტაივანი', p:[[39.9,116.4],[24.1,121.1]], q:'Taiwan crisis' }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        // ფუნქცია ისრის თავის დასამატებლად
        function addArrowHead(latlng, color, angle) {
            return L.marker(latlng, {
                icon: L.divIcon({
                    className: 'arrow-head',
                    html: `<div style="color:${color}; transform: rotate(${angle}deg);">▼</div>`,
                    iconSize: [20, 20], iconAnchor: [10, 10]
                }),
                interactive: false
            }).addTo(map);
        }

        conflicts.forEach(conf => {
            const color = colors[conf.type];
            
            // ფრონტის ხაზი
            const line = L.polyline(conf.p, { color: color, weight: 3, opacity: 0.8, className: 'line-active' }).addTo(map);
            const hit = L.polyline(conf.p, { color: 'transparent', weight: 40, interactive: true }).addTo(map);

            // ისრების გამოთვლა (მარტივი კუთხით)
            const lat1 = conf.p[0][0], lon1 = conf.p[0][1];
            const lat2 = conf.p[1][0], lon2 = conf.p[1][1];
            const angle = Math.atan2(lon2 - lon1, lat2 - lat1) * 180 / Math.PI;

            // დავამატოთ ისრები ორივე ბოლოში (თუ ომია)
            if(conf.type === 'war' || conf.type === 'local') {
                addArrowHead(conf.p[1], color, angle); // ისარი სამიზნისკენ
                addArrowHead(conf.p[0], color, angle + 180); // ისარი უკან (აგრესორისკენ)
            }

            const showDetails = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card" style="border-left-color:${color}">
                        <h3 style="color:#fff; margin:0 0 5px 0;">${conf.f} ↔ ${conf.t}</h3>
                        <p style="color:#aaa; font-size:0.9em;">კატეგორია: ${conf.type.toUpperCase()}</p>
                        <p style="color:#ffaa00; font-size:0.8em; margin-top:5px;">აქტიური ფრონტის ხაზი</p>
                    </div>`;
                loadNews(conf.q);
            };

            hit.on('click', showDetails);

            // ქვეყნების სახელები
            L.marker(conf.p[0], { icon: L.divIcon({ className:'label', html:`<b style="color:#fff; font-size:9px; background:rgba(0,0,0,0.5); padding:2px;">${conf.f}</b>`, iconSize:[60,10] }) }).addTo(map);
            L.marker(conf.p[1], { icon: L.divIcon({ className:'label', html:`<b style="color:#fff; font-size:9px; background:rgba(0,0,0,0.5); padding:2px;">${conf.t}</b>`, iconSize:[60,10] }) }).addTo(map);
        });

    </script>
</body>
</html>
