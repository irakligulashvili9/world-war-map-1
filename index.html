<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global War Monitor - 56+ Conflicts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; } 
        #info-panel { width: 400px; min-width: 320px; background: #050505; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 2000; color: #fff; border-left: 1px solid #333; }
        
        #stat-overlay { position: absolute; top: 10px; left: 50px; background: rgba(0,0,0,0.9); border: 1px solid #ff4444; padding: 12px; color: #fff; z-index: 1000; border-radius: 4px; font-size: 0.85em; pointer-events: none; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot-ref { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        .strike-card { background: #0d0d0d; padding: 15px; border: 1px solid #333; border-left: 6px solid #ff0000; }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; min-height: 400px; margin-top: 15px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* ანიმაციური ისრები */
        .arrow-line { stroke-dasharray: 10, 10; animation: dash 20s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <div id="stat-overlay">
        <strong style="color:#ffaa00">WAR MONITOR - FULL DEPLOYMENT</strong><hr style="border:0; border-top:1px solid #333">
        <div class="legend-item"><div class="dot-ref" style="background:#ff0000"></div> აქტიური ომი: <b>56</b></div>
        <div class="legend-item"><div class="dot-ref" style="background:#ffa500"></div> შეტაკება: <b>114</b></div>
        <div class="legend-item"><div class="dot-ref" style="background:#00ccff"></div> გაყინული: <b>22</b></div>
    </div>

    <div id="map"></div>
    <div id="info-panel">
        <h2 style="color:#ff4444; text-align:center; letter-spacing: 2px;">STRATEGIC DATA</h2>
        <div id="details"><p style="text-align:center; color:#666;">აირჩიეთ სამიზნე ობიექტი რუკაზე</p></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([15, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const colors = { war:'#ff0000', local:'#ffa500', frozen:'#00ccff', critical:'#cc00ff' };

        const conflicts = [
            // --- 🔴 აქტიური ომები (EUROPE & ASIA) ---
            { type:'war', f:'რუსეთი', t:'უკრაინა', p:[[55.7,37.6],[50.4,30.5]], q:'Ukraine frontline news' },
            { type:'war', f:'ისრაელი', t:'ლიბანი', p:[[31.7,35.2],[33.8,35.5]], q:'Israel Lebanon war' },
            { type:'war', f:'ისრაელი', t:'ღაზა', p:[[31.7,35.2],[31.4,34.4]], q:'Gaza war update' },
            { type:'war', f:'მიანმარი', t:'აჯანყებულები', p:[[19.7,96.1],[22.0,96.0]], q:'Myanmar civil war' },
            { type:'war', f:'სირია', t:'იდლიბი', p:[[33.5,36.3],[35.9,36.6]], q:'Syria Idlib conflict' },
            { type:'war', f:'ერაყი', t:'ISIS/Resistance', p:[[33.3,44.3],[34.5,43.0]], q:'Iraq insurgency' },
            { type:'war', f:'ავღანეთი', t:'Resistance', p:[[34.5,69.1],[35.5,70.5]], q:'Afghanistan resistance' },
            
            // --- 🔴 აფრიკა (AFRICA) ---
            { type:'war', f:'სუდანი', t:'RSF', p:[[15.5,32.5],[13.5,25.5]], q:'Sudan RSF war' },
            { type:'war', f:'კონგო', t:'M23', p:[[-4.3,15.3],[-1.6,29.2]], q:'Congo war M23' },
            { type:'war', f:'მალი', t:'Tuareg', p:[[12.6,-8.0],[17.5,-0.5]], q:'Mali Tuareg war' },
            { type:'war', f:'ეთიოპია', t:'Fano', p:[[9.0,38.7],[11.5,37.5]], q:'Ethiopia Fano news' },
            { type:'war', f:'ბურკინა ფასო', t:'JNIM', p:[[12.3,-1.5],[14.0,-1.0]], q:'Burkina Faso conflict' },
            { type:'war', f:'სომალი', t:'Al-Shabaab', p:[[2.0,45.3],[4.5,46.5]], q:'Somalia Al-Shabaab' },
            { type:'war', f:'ნიგერია', t:'Boko Haram', p:[[9.0,7.5],[12.0,13.5]], q:'Nigeria Boko Haram' },
            { type:'war', f:'ცენტრ. აფრიკა', t:'CPC', p:[[4.4,18.5],[6.5,20.0]], q:'CAR conflict' },
            { type:'war', f:'ნიგერი', t:'Insurgents', p:[[13.5,2.1],[15.0,5.0]], q:'Niger insurgency' },
            { type:'war', f:'ჩადი', t:'FACT', p:[[12.1,15.0],[18.0,17.0]], q:'Chad FACT news' },
            { type:'war', f:'მოზამბიკი', t:'ASWJ', p:[[-25.9,32.6],[-12.0,40.0]], q:'Mozambique insurgency' },

            // --- 🟠 ლოკალური შეტაკებები (LOCAL) ---
            { type:'local', f:'აზერბაიჯანი', t:'სომხეთი', p:[[40.4,49.8],[40.1,44.5]], q:'Armenia Azerbaijan' },
            { type:'local', f:'იემენი', t:'ჰუთები', p:[[15.3,44.2],[15.0,42.8]], q:'Houthi Red Sea' },
            { type:'local', f:'სერბეთი', t:'კოსოვო', p:[[44.8,20.4],[42.8,21.0]], q:'Kosovo tension' },
            { type:'local', f:'მექსიკა', t:'კარტელები', p:[[19.4,-99.1],[24.0,-103.0]], q:'Mexico cartel war' },
            { type:'local', f:'ინდოეთი', t:'პაკისტანი', p:[[28.6,77.2],[34.0,74.5]], q:'Kashmir border' },
            { type:'local', f:'ფილიპინები', t:'S. China Sea', p:[[14.6,121.0],[10.0,118.0]], q:'Philippines China sea' },
            { type:'local', f:'ლიბია', t:'Factions', p:[[32.8,13.1],[31.0,15.0]], q:'Libya tension' },
            { type:'local', f:'პაკისტანი', t:'BLA', p:[[33.6,73.0],[29.0,66.0]], q:'Pakistan Balochistan' },
            { type:'local', f:'კოლუმბია', t:'ELN/FARC', p:[[4.7,-74.0],[2.5,-76.0]], q:'Colombia conflict' },
            { type:'local', f:'ეკვადორი', t:'Gangs', p:[[-0.1,-78.4],[-2.2,-79.8]], q:'Ecuador crisis' },

            // --- 🔵 გაყინული კონფლიქტები (FROZEN) ---
            { type:'frozen', f:'რუსეთი', t:'საქართველო', p:[[43.5,39.5],[42.3,42.0]], q:'Occupation Georgia' },
            { type:'frozen', f:'მოლდოვა', t:'დნესტრი', p:[[47.0,28.8],[46.8,29.6]], q:'Transnistria' },
            { type:'frozen', f:'კვიპროსი', t:'ჩრდ. კვიპროსი', p:[[35.1,33.3],[35.3,33.7]], q:'Cyprus conflict' },
            { type:'frozen', f:'კორეა', t:'DMZ', p:[[37.5,127.0],[38.3,127.2]], q:'Korea DMZ' },
            { type:'frozen', f:'საჰარა', t:'Polisario', p:[[27.1,-13.2],[25.0,-13.0]], q:'Western Sahara' },
            { type:'frozen', f:'ტაივანი', t:'ჩინეთი', p:[[39.9,116.4],[24.0,121.0]], q:'Taiwan crisis news' }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        conflicts.forEach(conf => {
            const color = colors[conf.type];
            
            // ვექტორული ხაზი ისრის ეფექტით
            const line = L.polyline(conf.p, { color: color, weight: 2.5, opacity: 0.7, className: 'arrow-line' }).addTo(map);
            
            // Hitbox (45px)
            const hit = L.polyline(conf.p, { color: 'transparent', weight: 45, interactive: true }).addTo(map);

            const showInfo = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card" style="border-left-color:${color}">
                        <h3 style="color:#fff; margin:0 0 5px 0;">${conf.f} ➔ ${conf.t}</h3>
                        <p style="color:#aaa; font-size:0.9em; text-transform:uppercase;">სტატუსი: ${conf.type}</p>
                    </div>`;
                loadNews(conf.q);
            };

            hit.on('click', showInfo);

            // ისრის წვერი (სამიზნეზე)
            L.circleMarker(conf.p[1], {
                radius: 6, fillColor: color, color: "#000", weight: 1, fillOpacity: 1, interactive: true
            }).addTo(map).on('click', showInfo);

            // აგრესორის სახელი (პატარა ტექსტი)
            L.marker(conf.p[0], { 
                icon: L.divIcon({ className:'label', html:`<span style="color:#fff; font-size:9px; background:rgba(0,0,0,0.6); padding:1px 3px;">${conf.f}</span>`, iconSize:[60,10] }) 
            }).addTo(map);
        });

    </script>
</body>
</html>
