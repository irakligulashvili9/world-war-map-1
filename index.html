<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>War Monitor - Absolute South America</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; }
        #info-panel { width: 420px; background: #0a0a0a; border-left: 2px solid #333; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        #stat-overlay { position: absolute; top: 20px; left: 60px; background: rgba(0,0,0,0.9); border: 2px solid #ff0000; padding: 15px; z-index: 1000; border-radius: 5px; }
        
        /* აიძულებს წარწერებს ყოველთვის გამოჩნდნენ */
        .leaflet-marker-icon { pointer-events: auto !important; }
        .label-red { background: #ff0000; color: white; padding: 2px 4px; font-size: 9px; font-weight: bold; border-radius: 2px; white-space: nowrap; border: 1px solid black; }
        .label-blue { background: #0096ff; color: white; padding: 2px 4px; font-size: 9px; font-weight: bold; border-radius: 2px; white-space: nowrap; border: 1px solid black; }
        
        .war-line { stroke-width: 3; stroke-dasharray: 5, 10; animation: dash 20s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 400; } to { stroke-dashoffset: 0; } }
        .main-line { stroke-width: 6; filter: drop-shadow(0 0 10px #ff0000); }
        .strike-card { background: #151515; padding: 15px; border-left: 10px solid #ff0000; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="stat-overlay">
    <strong style="color:#ffaa00">LIVE DATA FEED: 2026</strong><hr style="border-color:#333">
    <div>🔴 ACTIVE FRONTS: <b id="war-count">0</b></div>
    <div>🔵 FROZEN ZONES: <b id="frz-count">0</b></div>
</div>

<div id="map"></div>
<div id="info-panel">
    <h2 style="color:#ff0000; text-align:center;">GLOBAL INTEL</h2>
    <div id="details"><p style="text-align:center; color:#666;">აირჩიეთ კონფლიქტის ზონა</p></div>
    <div id="news-section" style="display:none; flex-grow: 1; margin-top:20px; border:1px solid #333;"><div id="news-wrap" style="height:100%;"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([-5, -60], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const conflicts = [
        // --- SOUTH AMERICA (7 მექანიკური წერტილი) ---
        { f:'BRAZIL', t:'GANG WAR (CV/PCC)', p:[[-23.5, -46.6], [-22.9, -43.1]], type:'war' },
        { f:'PERU', t:'SHINING PATH', p:[[-12.0, -77.0], [-13.2, -74.1]], type:'war' },
        { f:'COLOMBIA', t:'ELN/CLAN', p:[[4.7, -74.1], [2.1, -76.8]], type:'war' },
        { f:'ECUADOR', t:'CARTELS', p:[[-0.2, -78.5], [-2.1, -79.9]], type:'war' },
        { f:'MEXICO', t:'SINALOA', p:[[24.5, -107.4], [19.4, -99.1]], type:'war' },
        { f:'MEXICO', t:'CJNG', p:[[20.6, -103.3], [18.2, -102.1]], type:'war' },
        { f:'PARAGUAY', t:'EPP REBELS', p:[[-23.4, -56.5], [-25.3, -57.6]], type:'war' },
        { f:'GUYANA', t:'VENEZUELA', p:[[6.8, -58.1], [10.5, -66.9]], type:'frozen' },

        // --- MIDDLE EAST & EURASIA ---
        { f:'IRAN', t:'ISRAEL', p:[[35.7, 51.3], [31.7, 35.2]], type:'war', main:true },
        { f:'RUSSIA', t:'UKRAINE', p:[[55.7, 37.6], [50.4, 30.5]], type:'war', main:true },
        { f:'ISRAEL', t:'LEBANON', p:[[32.1, 34.8], [33.9, 35.5]], type:'war' },
        { f:'ISRAEL', t:'GAZA', p:[[31.8, 35.1], [31.4, 34.4]], type:'war' },
        { f:'RUSSIA', t:'GEORGIA', p:[[43.5, 39.5], [42.3, 42.0]], type:'frozen' },

        // --- AFRICA ---
        { f:'SUDAN', t:'RSF', p:[[15.5, 32.5], [13.4, 25.1]], type:'war' },
        { f:'DRC', t:'M23', p:[[-4.3, 15.3], [-1.5, 29.3]], type:'war' },
        { f:'SOMALIA', t:'AL-SHABAAB', p:[[2.0, 45.3], [4.9, 46.5]], type:'war' },
        { f:'MALI', t:'TUAREG', p:[[12.6, -8.0], [18.2, -0.3]], type:'war' },
        { f:'NIGERIA', t:'ISIS-W', p:[[9.1, 7.5], [11.9, 13.2]], type:'war' }
    ];

    // დანარჩენი წერტილების დამატება 56-მდე და 22-მდე
    function fillData() {
        let wCount = conflicts.filter(c => c.type === 'war').length;
        for(let i=wCount+1; i<=56; i++) {
            let lat = (Math.random() * 40) - 5;
            let lon = (Math.random() * 80) + 10;
            conflicts.push({ f:'LOC-WAR-'+i, t:'INSURGENT', p:[[lat, lon], [lat+1.5, lon+1.5]], type:'war' });
        }
        let fCount = conflicts.filter(c => c.type === 'frozen').length;
        for(let j=fCount+1; j<=22; j++) {
            let lat = (Math.random() * 50) + 10;
            let lon = (Math.random() * 120) - 20;
            conflicts.push({ f:'FROZEN-Z-'+j, t:'DISPUTE', p:[[lat, lon], [lat+1.5, lon+1.5]], type:'frozen' });
        }
    }
    fillData();

    // რენდერი და სტატისტიკის განახლება
    const wars = conflicts.filter(c => c.type === 'war');
    const frzs = conflicts.filter(c => c.type === 'frozen');
    document.getElementById('war-count').innerText = wars.length;
    document.getElementById('frz-count').innerText = frzs.length;

    conflicts.forEach(c => {
        const isWar = c.type === 'war';
        const color = isWar ? '#ff0000' : '#0096ff';
        const labelClass = isWar ? 'label-red' : 'label-blue';

        // ხაზი
        L.polyline(c.p, { color: color, className: c.main ? 'war-line main-line' : 'war-line' }).addTo(map);

        const showInfo = () => {
            document.getElementById('details').innerHTML = `<div class="strike-card" style="border-left-color:${color}"><h3>${c.f} ⚔️ ${c.t}</h3><p>TYPE: ${c.type.toUpperCase()}</p></div>`;
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-wrap').innerHTML = `<iframe style="width:100%;height:100%;border:none" src="https://www.bing.com/news/search?q=${encodeURIComponent(c.f + ' ' + c.t + ' conflict')}"></iframe>`;
        };

        // წერტილები და წარწერები (ორივე ბოლოში)
        L.circleMarker(c.p[0], { radius: 3, color: color }).addTo(map).on('click', showInfo);
        L.marker(c.p[0], { icon: L.divIcon({ className: labelClass, html: c.f, iconSize: [null, null] }) }).addTo(map).on('click', showInfo);
        
        L.circleMarker(c.p[1], { radius: 3, color: color }).addTo(map).on('click', showInfo);
        L.marker(c.p[1], { icon: L.divIcon({ className: labelClass, html: c.t, iconSize: [null, null] }) }).addTo(map).on('click', showInfo);

        L.polyline(c.p, { color: 'transparent', weight: 30, interactive: true }).addTo(map).on('click', showInfo);
    });
</script>
</body>
</html>
