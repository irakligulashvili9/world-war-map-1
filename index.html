<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic Monitor - 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; cursor: crosshair; } 
        #resizer { width: 8px; cursor: col-resize; background: #1a1a1a; z-index: 3000; border-left: 1px solid #333; }
        #resizer:hover { background: #ffaa00; }
        #info-panel { width: 400px; min-width: 300px; max-width: 900px; height: 100%; background: #050505; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 2000; }
        
        /* 📊 სტატისტიკის პანელი */
        #stat-overlay { position: absolute; top: 10px; left: 50px; background: rgba(0,0,0,0.85); border: 1px solid #ff4444; padding: 10px; color: #fff; z-index: 1000; border-radius: 4px; font-size: 0.8em; line-height: 1.4; box-shadow: 0 0 15px rgba(255,0,0,0.3); pointer-events: none; }
        .stat-val { color: #ff4444; font-weight: bold; }

        h2 { color: #ffaa00; text-align: center; font-size: 1.1em; border-bottom: 2px solid #ffaa00; padding-bottom: 10px; margin: 0 0 15px 0; text-transform: uppercase; }
        .clock-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .clock-box { background: #111; padding: 6px; border: 1px solid #333; text-align: center; }
        .clock-time { font-family: 'Courier New', monospace; color: #fff; font-size: 0.85em; }

        .war-pulse { width: 14px; height: 14px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 15px #ff0000; animation: flash 1.2s infinite; }
        @keyframes flash { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.6); } 100% { opacity: 1; transform: scale(1); } }

        .flow-line { stroke-dasharray: 12, 18; animation: flow 20s linear infinite; }
        .aid-line { stroke-dasharray: 6, 12; animation: flow 35s linear reverse infinite; filter: drop-shadow(0 0 5px #ffaa00); }
        @keyframes flow { from { stroke-dashoffset: 600; } to { stroke-dashoffset: 0; } }

        .strike-card { background: #0d0d0d; border-left: 5px solid #ff4444; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .aid-card { border-left-color: #ffaa00 !important; border-color: #443300 !important; }
        
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; min-height: 300px; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
        .label-style { color: #fff; background: rgba(0,0,0,0.85); border: 1px solid #555; font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="stat-overlay">
        <strong>GLOBAL CONFLICT STATUS 2026</strong><br>
        აქტიური ომები: <span class="stat-val">56</span><br>
        ლოკალური შეტაკებები: <span class="stat-val">114</span><br>
        გაყინული კონფლიქტები: <span class="stat-val">22</span><br>
        კრიტიკული ზონები: <span class="stat-val">9</span>
    </div>

    <div id="map"></div>
    <div id="resizer"></div>
    <div id="info-panel">
        <h2>🛰️ STRATEGIC CONTROL</h2>
        <div class="clock-grid" id="clocks"></div>
        <div id="details"><p style="text-align:center; color:#666; font-size: 0.85em;">აირჩიეთ წითელი ან ყვითელი ხაზი</p></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Resize Logic
        const resizer = document.getElementById("resizer"), panel = document.getElementById("info-panel");
        let isResizing = false;
        resizer.onmousedown = () => { isResizing = true; };
        document.onmousemove = (e) => {
            if (!isResizing) return;
            let w = document.body.offsetWidth - e.clientX;
            if (w > 250 && w < 900) { panel.style.width = w + "px"; map.invalidateSize(); }
        };
        document.onmouseup = () => { isResizing = false; };

        function updateClocks() {
            const zones = [{n:'WASHINGTON', z:'America/New_York'}, {n:'KYIV', z:'Europe/Kyiv'}, {n:'TBILISI', z:'Asia/Tbilisi'}, {n:'BEIJING', z:'Asia/Shanghai'}];
            document.getElementById('clocks').innerHTML = zones.map(z => `<div class="clock-box"><span style="font-size:0.55em;color:#ffaa00">${z.n}</span><div class="clock-time">${new Date().toLocaleTimeString('en-GB',{timeZone:z.z, hour12:false})}</div></div>`).join('');
        }
        setInterval(updateClocks, 1000); updateClocks();

        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20, 20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // ძირითადი ჰაბები დახმარებისთვის
        const hubs = { USA:[38.9,-77.0], EU:[50.8,4.3], CHINA:[39.9,116.4], IRAN:[35.7,51.3], RUSSIA:[55.7,37.6], TURKEY:[39.9,32.8], UK:[51.5,-0.1] };

        const data = [
            // ⚔️ კონფლიქტები
            { f:"რუსეთი", t:"უკრაინა", p:[[55.7,37.6],[50.4,30.5]], q:"Ukraine war frontline news", s:"ომი", c:"ექსპანსია", aid:[{h:"USA",d:"HIMARS/დაზვერვა"},{h:"UK",d:"Storm Shadow"},{h:"EU",d:"საფინანსო"}] },
            { f:"რუსეთი", t:"საქართველო", p:[[43.5,39.5],[42.3,42.0]], q:"Occupation Georgia live", s:"ოკუპაცია", c:"გეოპოლიტიკური კონტროლი", aid:[{h:"USA",d:"სტრატეგიული თავდაცვა"}] },
            { f:"ისრაელი", t:"ღაზა/ლიბანი", p:[[31.7,35.2],[33.5,35.4]], q:"Israel Hezbollah war news", s:"ომი", c:"ტერორიზმთან ბრძოლა", aid:[{h:"USA",d:"Iron Dome / THAAD"}] },
            { f:"ირანი", t:"ისრაელი", p:[[32.6,51.6],[32.0,34.8]], q:"Iran Israel conflict", s:"ესკალაცია", c:"სარაკეტო ომი", aid:[{h:"USA",d:"Aegis სისტემები"}] },
            { f:"ჩინეთი", t:"ტაივანი", p:[[26.0,119.3],[25.0,121.5]], q:"Taiwan Strait tension", s:"ბლოკადა", c:"სუვერენიტეტის დავა", aid:[{h:"USA",d:"F-16 & ფლოტი"}] },
            { f:"აზერბაიჯანი", t:"სომხეთი", p:[[40.4,49.8],[40.1,44.5]], q:"Armenia Azerbaijan news", s:"დაძაბულობა", c:"დერეფნის დავა", aid:[{h:"TURKEY",d:"დრონები და წვრთნები"}] },
            { f:"იემენი", t:"წითელი ზღვა", p:[[15.3,44.2],[15.5,41.5]], q:"Houthi Red Sea attack", s:"ბლოკადა", c:"ვაჭრობის შეფერხება", aid:[{h:"IRAN",d:"ბალისტიკური რაკეტები"}] },
            { f:"ჩრდ. კორეა", t:"სამხ. კორეა", p:[[39.0,125.7],[37.5,127.0]], q:"Korea tension DMZ", s:"მზადყოფნა", c:"ბირთვული საფრთხე", aid:[{h:"USA",d:"ბირთვული შეკავება"}] },
            { f:"სუდანი", t:"შიდა ომი", p:[[15.5,32.5],[12.0,24.0]], q:"Sudan civil war news", s:"ომი", c:"ძალაუფლების ომი", aid:[{h:"RUSSIA",d:"ლოგისტიკა (ვაგნერი)"}] },
            { f:"ვენესუელა", t:"გაიანა", p:[[7.5,-66.5],[6.8,-59.5]], q:"Essequibo Guyana news", s:"დავა", c:"ნავთობის ანექსია", aid:[{h:"USA",d:"სამხრეთის სარდლობა"}] },
            { f:"სერბეთი", t:"კოსოვო", p:[[44.8,20.4],[42.6,21.1]], q:"Kosovo Serbia news", s:"კრიზისი", c:"ეთნიკური დავა", aid:[{h:"EU",d:"KFOR მისია"}] },
            { f:"ეთიოპია", t:"სომალი", p:[[9.0,38.7],[2.0,45.3]], q:"Ethiopia Somalia tension", s:"დავა", c:"საზღვაო კრიზისი", aid:[{h:"TURKEY",d:"საზღვაო დაცვა"}] },
            { f:"ხუნტა", t:"მიანმარი", p:[[19.7,96.1],[22.0,96.0]], q:"Myanmar civil war news", s:"ომი", c:"შიდა წინააღმდეგობა", aid:[{h:"CHINA",d:"პოლიტიკური ზურგი"}] },
            { f:"ინდოეთი", t:"პაკისტანი", p:[[28.6,77.2],[33.6,73.0]], q:"Kashmir conflict news", s:"გაყინული", c:"კაშმირის დავა", aid:[{h:"RUSSIA",d:"S-400 სისტემები"}] }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(conf => {
            // 🔴 კონფლიქტის ხაზი
            const warLine = L.polyline(conf.p, { color:'#ff0000', weight:3, opacity:0.8, className:'flow-line' }).addTo(map);
            const warHit = L.polyline(conf.p, { color:'transparent', weight:45, interactive: true }).addTo(map);

            const showWar = () => {
                document.getElementById('details').innerHTML = `<div class="strike-card">
                    <div style="font-size:0.7em; color:#ff4444; font-weight:bold;">${conf.s}</div>
                    <h3 style="color:#fff; margin:5px 0;">${conf.f} ➔ ${conf.t}</h3>
                    <p style="color:#aaa; font-size:0.85em;">${conf.c}</p>
                </div>`;
                loadNews(conf.q);
            };
            warHit.on('click', showWar);

            // 🟡 დახმარების ხაზები
            if(conf.aid) {
                conf.aid.forEach(a => {
                    const aidLine = L.polyline([hubs[a.h], conf.p[1]], { color:'#ffaa00', weight:2, opacity:0.6, className:'aid-line' }).addTo(map);
                    const aidHit = L.polyline([hubs[a.h], conf.p[1]], { color:'transparent', weight:45, interactive: true }).addTo(map);
                    
                    aidHit.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        document.getElementById('details').innerHTML = `<div class="strike-card aid-card">
                            <div style="font-size:0.7em; color:#ffaa00; font-weight:bold;">გლობალური მხარდაჭერა</div>
                            <h3 style="color:#ffaa00; margin:5px 0;">${a.h} ➔ ${conf.t}</h3>
                            <p style="color:#ccc; font-size:0.85em;">რესურსი: ${a.d}</p>
                        </div>`;
                        loadNews(a.h + " military support " + conf.t);
                    });
                });
            }

            const dot = L.marker(conf.p[1], { icon: L.divIcon({ className:'war-pulse', iconSize:[14,14] }) }).addTo(map);
            dot.on('click', showWar);
            L.marker(conf.p[0], { icon: L.divIcon({ className:'label-style', html: conf.f }) }).addTo(map);
        });

        // ჰაბების წერტილები
        Object.keys(hubs).forEach(h => {
            L.marker(hubs[h], { icon: L.divIcon({ className:'label-style', html:'★ '+h, style:'color:#ffaa00; border-color:#ffaa00' }) }).addTo(map);
        });
    </script>
</body>
</html>
