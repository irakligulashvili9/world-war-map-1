<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic War Map 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; } 
        #info-panel { width: 450px; background: #050505; display: flex; flex-direction: column; padding: 20px; border-left: 2px solid #333; overflow-y: auto; color: #fff; }
        
        #stat-overlay { position: absolute; top: 15px; left: 60px; background: rgba(0,0,0,0.9); border: 2px solid #ff0000; padding: 15px; color: #fff; z-index: 1000; border-radius: 5px; font-size: 0.9em; pointer-events: none; }
        
        /* ქვეყნების წარწერების სტილი */
        .country-label { 
            color: #fff; 
            background: rgba(255, 0, 0, 0.2); 
            border: 1px solid #ff0000; 
            padding: 2px 5px; 
            font-size: 10px; 
            font-weight: bold; 
            white-space: nowrap;
            text-transform: uppercase;
            border-radius: 3px;
        }
        .frozen-label { border-color: #00ccff; background: rgba(0, 204, 255, 0.2); }

        .strike-card { background: #111; padding: 20px; border-left: 10px solid #ff0000; border-radius: 4px; box-shadow: 0 0 20px rgba(255,0,0,0.1); }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; margin-top: 15px; min-height: 400px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ანიმაციური ხაზები */
        .war-line { stroke-dasharray: 8, 12; animation: move 25s linear infinite; stroke-width: 3; }
        .iran-israel-line { stroke-width: 5; filter: drop-shadow(0 0 8px #ff0000); animation: pulse-line 2s infinite; }
        @keyframes move { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
        @keyframes pulse-line { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

    <div id="stat-overlay">
        <strong style="color:#ffaa00">GLOBAL CONFLICTS 2026</strong><hr style="border-color:#444">
        <div>🔴 აქტიური ფრონტი: <b>56</b></div>
        <div>🔵 გაყინული ზონა: <b>22</b></div>
    </div>

    <div id="map"></div>
    <div id="info-panel">
        <h2 style="color:#ff0000; text-align:center; letter-spacing:3px;">WAR MONITOR</h2>
        <div id="details"><p style="text-align:center; color:#666; margin-top:50px;">დააწკაპუნეთ ხაზს ან ქვეყანას</p></div>
        <div id="news-section" class="news-container" style="display:none;"><div id="news-frame-wrapper" style="height:100%;"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20, 30], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const data = [
            // --- 🔴 კრიტიკული ომები (ირანი-ისრაელი ცენტრში) ---
            { f:'ირანი', t:'ისრაელი', p:[[35.7, 51.3], [31.7, 35.2]], type:'war', special:true, q:'Iran Israel war update' },
            { f:'რუსეთი', t:'უკრაინა', p:[[55.7, 37.6], [50.4, 30.5]], type:'war', q:'Ukraine war news' },
            { f:'ისრაელი', t:'ლიბანი', p:[[32.1, 34.8], [33.9, 35.5]], type:'war', q:'Israel Hezbollah' },
            { f:'ისრაელი', t:'ღაზა', p:[[31.8, 35.1], [31.4, 34.4]], type:'war', q:'Gaza update' },
            
            // --- 🔴 აფრიკის ომები (აქტიური) ---
            { f:'სუდანი', t:'RSF', p:[[15.5, 32.5], [13.6, 25.4]], type:'war', q:'Sudan war' },
            { f:'კონგო', t:'M23', p:[[-4.3, 15.3], [-1.6, 29.2]], type:'war', q:'Congo war' },
            { f:'ეთიოპია', t:'Fano', p:[[9.0, 38.7], [11.5, 37.5]], type:'war', q:'Ethiopia conflict' },
            { f:'მალი', t:'Tuareg', p:[[12.6, -8.0], [18.0, 0.0]], type:'war', q:'Mali war' },
            { f:'სომალი', t:'Al-Shabaab', p:[[2.0, 45.3], [5.1, 46.5]], type:'war', q:'Somalia conflict' },
            { f:'ნიგერია', t:'Boko Haram', p:[[9.1, 7.5], [11.8, 13.1]], type:'war', q:'Nigeria war' },
            { f:'ბურკინა ფასო', t:'ISIS', p:[[12.3, -1.5], [13.8, -1.0]], type:'war', q:'Burkina Faso' },
            { f:'მიანმარი', t:'PDF/Rebels', p:[[19.7, 96.1], [22.0, 96.0]], type:'war', q:'Myanmar war' },
            
            // --- 🔵 გაყინული კონფლიქტები (ხაზი ორივე ბოლოში წარწერით) ---
            { f:'რუსეთი', t:'საქართველო', p:[[43.5, 39.5], [42.3, 42.0]], type:'frozen', q:'Occupation Georgia' },
            { f:'ჩრდ. კორეა', t:'სამხ. კორეა', p:[[39.0, 125.7], [37.5, 127.0]], type:'frozen', q:'Korea DMZ news' },
            { f:'მოლდოვა', t:'დნესტრი', p:[[47.0, 28.8], [46.8, 29.6]], type:'frozen', q:'Transnistria conflict' },
            { f:'კვიპროსი', t:'TRNC', p:[[35.1, 33.3], [35.3, 33.8]], type:'frozen', q:'Cyprus partition' },
            { f:'ჩინეთი', t:'ტაივანი', p:[[39.9, 116.4], [24.0, 121.0]], type:'frozen', q:'Taiwan crisis' },
            { f:'აზერბაიჯანი', t:'სომხეთი', p:[[40.4, 49.8], [40.1, 44.5]], type:'frozen', q:'Armenia Azerbaijan' },
            { f:'სერბეთი', t:'კოსოვო', p:[[44.8, 20.4], [42.6, 21.1]], type:'frozen', q:'Kosovo tension' }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(conf => {
            const isWar = conf.type === 'war';
            const color = isWar ? '#ff0000' : '#00ccff';
            const className = conf.special ? 'war-line iran-israel-line' : 'war-line';

            // 1. დავხაზოთ ფრონტის ხაზი
            const line = L.polyline(conf.p, { color: color, weight: isWar ? 3 : 2, className: className }).addTo(map);
            const hit = L.polyline(conf.p, { color: 'transparent', weight: 40, interactive: true }).addTo(map);

            const showDetails = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card" style="border-left-color:${color}">
                        <h3 style="color:#fff; margin:0 0 10px 0;">${conf.f} ⚔️ ${conf.t}</h3>
                        <p style="color:#aaa; font-size:0.9em; margin:0;">კატეგორია: ${conf.type.toUpperCase()}</p>
                        <p style="color:#ffaa00; font-size:0.8em; margin-top:10px;">სტატუსი: 2026 წლის აქტიური მონიტორინგი</p>
                    </div>`;
                loadNews(conf.q);
            };

            hit.on('click', showDetails);

            // 2. დავამატოთ ქვეყნის სახელები ორივე ბოლოში
            const labelClass = isWar ? 'country-label' : 'country-label frozen-label';
            
            L.marker(conf.p[0], { 
                icon: L.divIcon({ className: labelClass, html: conf.f, iconSize: [null, null] }) 
            }).addTo(map).on('click', showDetails);

            L.marker(conf.p[1], { 
                icon: L.divIcon({ className: labelClass, html: conf.t, iconSize: [null, null] }) 
            }).addTo(map).on('click', showDetails);

            // 3. შუა წერტილი (ომის ეპიცენტრი)
            const midPoint = [(conf.p[0][0] + conf.p[1][0]) / 2, (conf.p[0][1] + conf.p[1][1]) / 2];
            L.circleMarker(midPoint, { 
                radius: conf.special ? 6 : 4, 
                fillColor: color, color: '#fff', weight: 1, fillOpacity: 1 
            }).addTo(map).on('click', showDetails);
        });

    </script>
</body>
</html>
