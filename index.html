<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global Strategic Monitor - 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        
        /* რუკის კონტეინერი */
        #map { flex-grow: 1; height: 100%; background: #000 !important; cursor: crosshair; } 
        
        /* 🖱️ გამყოფი ზოლი (Resizer) */
        #resizer {
            width: 6px;
            cursor: col-resize;
            background: #222;
            transition: background 0.2s;
            z-index: 3000;
        }
        #resizer:hover { background: #ffaa00; }

        /* საინფორმაციო პანელი */
        #info-panel { 
            width: 350px; /* საწყისი ზომა */
            min-width: 200px; 
            max-width: 800px;
            height: 100%; 
            background: #050505; 
            border-left: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            box-sizing: border-box; 
            overflow-y: auto; 
            z-index: 2000; 
        }
        
        h2 { color: #ffaa00; text-align: center; font-size: 1em; border-bottom: 1px solid #ffaa00; padding-bottom: 10px; margin: 0 0 15px 0; text-transform: uppercase; }
        .clock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .clock-box { background: #111; padding: 5px; border: 1px solid #222; text-align: center; }
        .clock-time { font-family: monospace; color: #fff; font-size: 0.75em; }

        .war-pulse { width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 10px #ff0000; animation: flash 1s infinite; pointer-events: none; }
        @keyframes flash { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } 100% { opacity: 1; transform: scale(1); } }

        .flow-line { stroke-dasharray: 10, 15; animation: flow 25s linear infinite; pointer-events: none; }
        @keyframes flow { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }

        .strike-card { background: #111; border-left: 4px solid #ff4444; padding: 10px; margin-bottom: 10px; animation: fadeIn 0.3s; }
        .news-container { flex-grow: 1; background: #000; border: 1px solid #333; min-height: 200px; margin-top: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .label-style { color: #fff; background: rgba(0,0,0,0.8); border: 1px solid #444; font-size: 8px; padding: 1px 3px; border-radius: 2px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="resizer"></div> <div id="info-panel">
        <h2>STRATEGIC HUB</h2>
        <div class="clock-grid" id="clocks"></div>
        <div id="details"><p style="text-align:center; color:#555; font-size: 0.8em;">დააწკაპუნეთ ობიექტს რუკაზე</p></div>
        <div id="news-section" class="news-container" style="display:none;">
            <div id="news-frame-wrapper" style="height:100%;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 🖱️ გამყოფის ლოგიკა (Resize Logic) ---
        const resizer = document.getElementById("resizer");
        const panel = document.getElementById("info-panel");
        let isResizing = false;

        resizer.addEventListener("mousedown", (e) => {
            isResizing = true;
            document.body.style.cursor = "col-resize";
        });

        document.addEventListener("mousemove", (e) => {
            if (!isResizing) return;
            let offsetRight = document.body.offsetWidth - e.clientX;
            if (offsetRight > 200 && offsetRight < 800) { // მინიმალური და მაქსიმალური ზომა
                panel.style.width = offsetRight + "px";
                map.invalidateSize(); // რუკის ზომის განახლება დინამიურად
            }
        });

        document.addEventListener("mouseup", () => {
            isResizing = false;
            document.body.style.cursor = "default";
        });

        // --- დანარჩენი ფუნქციონალი ---
        function updateClocks() {
            const zones = [ {n:'D.C.', z:'America/New_York'}, {n:'KYIV', z:'Europe/Kyiv'}, {n:'TBI', z:'Asia/Tbilisi'}, {n:'BJS', z:'Asia/Shanghai'} ];
            document.getElementById('clocks').innerHTML = zones.map(z => `
                <div class="clock-box"><span style="font-size:0.55em;color:#ffaa00">${z.n}</span><div class="clock-time">${new Date().toLocaleTimeString('en-GB',{timeZone:z.z, hour12:false})}</div></div>
            `).join('');
        }
        setInterval(updateClocks, 1000); updateClocks();

        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([25, 15], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const hubs = { USA:[38.9,-77.0], EU:[50.8,4.3], CHINA:[39.9,116.4], IRAN:[35.7,51.3], RUSSIA:[55.7,37.6], TURKEY:[39.9,32.8] };

        const data = [
            { f:"რუსეთი", t:"უკრაინა", p:[[55.7,37.6],[50.4,30.5]], q:"Ukraine war frontline news", s:"ომი", c:"მიზეზი: ტერიტორიული ექსპანსია", aid:[{h:"USA",d:"დაზვერვა და იარაღი"}] },
            { f:"რუსეთი", t:"საქართველო", p:[[43.5,39.5],[42.5,41.5]], q:"Occupation Georgia live", s:"ოკუპაცია", c:"მიზეზი: გეოპოლიტიკური გავლენა", aid:[{h:"USA",d:"სტრატეგიული მხარდაჭერა"}] },
            { f:"ისრაელი", t:"ღაზა/ლიბანი", p:[[31.7,35.2],[33.0,35.3]], q:"Israel Lebanon conflict news", s:"საომარი მოქმედება", c:"მიზეზი: რეგიონული უსაფრთხოება", aid:[{h:"USA",d:"Iron Dome სისტემები"}] },
            { f:"ირანი", t:"ისრაელი", p:[[32.6,51.6],[32.0,34.8]], q:"Iran Israel missile attack", s:"პირდაპირი ესკალაცია", c:"მიზეზი: რეგიონული დომინაცია", aid:[{h:"USA",d:"თავდაცვითი პაქტი"}] },
            { f:"ჩინეთი", t:"ტაივანი", p:[[26.0,119.3],[25.0,121.5]], q:"Taiwan invasion threat news", s:"ბლოკადა", c:"მიზეზი: სუვერენიტეტის დავა", aid:[{h:"USA",d:"წყნარი ოკეანის ფლოტი"}] },
            { f:"იემენი", t:"წითელი ზღვა", p:[[15.3,44.2],[15.0,42.0]], q:"Houthi Red Sea shipping", s:"ბლოკადა", c:"მიზეზი: სავაჭრო გზების კონტროლი", aid:[{h:"IRAN",d:"სარაკეტო ტექნიკა"}] },
            { f:"აზერბაიჯანი", t:"სომხეთი", p:[[40.4,49.8],[40.1,44.5]], q:"Armenia Azerbaijan border", s:"დაძაბულობა", c:"მიზეზი: დერეფნის დავა", aid:[{h:"TURKEY",d:"სამხედრო დახმარება"}] }
        ];

        function loadNews(q) {
            document.getElementById('news-section').style.display = 'block';
            document.getElementById('news-frame-wrapper').innerHTML = `<iframe src="https://www.bing.com/news/search?q=${encodeURIComponent(q)}&qft=sortbydate%3d%221%22&form=NWRFSH"></iframe>`;
        }

        data.forEach(conf => {
            L.polyline(conf.p, { color:'#ff0000', weight:2, opacity:0.8, className:'flow-line' }).addTo(map);
            const hitBox = L.polyline(conf.p, { color:'transparent', weight:35, interactive: true }).addTo(map);

            const showInfo = () => {
                document.getElementById('details').innerHTML = `
                    <div class="strike-card">
                        <div style="font-size:0.65em; color:#ff4444; font-weight:bold;">${conf.s}</div>
                        <h4 style="color:#fff; margin:2px 0;">${conf.f} ➔ ${conf.t}</h4>
                        <div style="color:#888; font-size:0.75em; margin-top:4px;">${conf.c}</div>
                    </div>`;
                loadNews(conf.q);
            };

            hitBox.on('click', showInfo);
            const dot = L.marker(conf.p[1], { icon: L.divIcon({ className:'war-pulse', iconSize:[12,12] }) }).addTo(map);
            dot.on('click', showInfo);
            L.marker(conf.p[0], { icon: L.divIcon({ className:'label-style', html: conf.f }) }).addTo(map);
        });

        Object.keys(hubs).forEach(h => {
            L.marker(hubs[h], { icon: L.divIcon({ className:'label-style', html:'★ '+h, style:'color:#ffaa00' }) }).addTo(map);
        });
    </script>
</body>
</html>
