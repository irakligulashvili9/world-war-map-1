<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Global War Monitor - No Generic Names</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map { flex-grow: 1; height: 100%; background: #000 !important; }
        #info-panel { width: 450px; background: #0a0a0a; border-left: 2px solid #333; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        #stat-overlay { position: absolute; top: 20px; left: 60px; background: rgba(0,0,0,0.9); border: 2px solid #ff0000; padding: 15px; z-index: 1000; border-radius: 5px; }
        
        .label-red { background: #ff0000; color: white; padding: 2px 5px; font-size: 9px; font-weight: bold; border-radius: 2px; white-space: nowrap; border: 1px solid #000; }
        .label-blue { background: #0096ff; color: white; padding: 2px 5px; font-size: 9px; font-weight: bold; border-radius: 2px; white-space: nowrap; border: 1px solid #000; }
        
        .war-line { stroke-width: 2.5; stroke-dasharray: 6, 12; animation: dash 25s linear infinite; }
        .main-line { stroke-width: 6; filter: drop-shadow(0 0 12px #ff0000); }
        @keyframes dash { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
        .strike-card { background: #151515; padding: 15px; border-left: 10px solid #ff0000; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="stat-overlay">
    <strong style="color:#ffaa00">REAL DATA SYNC: 2026</strong><hr style="border-color:#333">
    <div>🔴 ACTIVE FRONTS: <b id="war-count">0</b></div>
    <div>🔵 FROZEN ZONES: <b id="frz-count">0</b></div>
</div>

<div id="map"></div>
<div id="info-panel">
    <h2 style="color:#ff0000; text-align:center; letter-spacing: 2px;">TACTICAL INTELLIGENCE</h2>
    <div id="details"><p style="text-align:center; color:#666;">დააწკაპუნეთ ობიექტს რუკაზე</p></div>
    <div id="news-section" style="display:none; flex-grow: 1; margin-top:20px; border:1px solid #333;"><div id="news-wrap" style="height:100%;"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([10, 0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const activeWars = [
        // --- SOUTH & CENTRAL AMERICA (რეალური ფრონტები) ---

        { f:'PERU', t:'VRAEM REBELS', p:[[-12.0, -77.0], [-13.2, -74.1]] },
        { f:'COLOMBIA', t:'ELN GUERRILLA', p:[[4.7, -74.1], [2.1, -76.8]] },
        { f:'COLOMBIA', t:'GOLFO CLAN', p:[[7.1, -75.5], [8.5, -76.2]] },
        { f:'ECUADOR', t:'TIGUERONES', p:[[-0.2, -78.5], [-2.1, -79.9]] },
        { f:'MEXICO', t:'SINALOA CARTEL', p:[[24.5, -107.4], [19.4, -99.1]] },
        { f:'MEXICO', t:'CJNG FORCE', p:[[20.6, -103.3], [18.2, -102.1]] },
        { f:'HAITI', t:'G9 ALLIANCE', p:[[18.5, -72.3], [19.1, -72.1]] },

        // --- MIDDLE EAST & EURASIA ---
        { f:'IRAN', t:'ISRAEL', p:[[35.7, 51.3], [31.7, 35.2]], main:true },
        { f:'RUSSIA', t:'UKRAINE', p:[[55.7, 37.6], [50.4, 30.5]], main:true },
        { f:'ISRAEL', t:'HEZBOLLAH', p:[[32.1, 34.8], [33.9, 35.5]] },
        { f:'ISRAEL', t:'HAMAS', p:[[31.8, 35.1], [31.4, 34.4]] },
        { f:'YEMEN', t:'HOUTHIS', p:[[15.3, 44.2], [15.1, 42.1]] },
        { f:'SYRIA', t:'HTS REBELS', p:[[33.5, 36.3], [36.2, 36.8]] },
        { f:'SYRIA', t:'SDF/TURKEY', p:[[35.1, 39.0], [37.0, 37.0]] },
        { f:'IRAQ', t:'ISIS CELLS', p:[[33.3, 44.3], [34.5, 43.5]] },
        { f:'TURKEY', t:'PKK KURDS', p:[[39.9, 32.8], [37.5, 43.0]] },

        { f:'PAKISTAN', t:'BLA REBELS', p:[[30.1, 67.0], [25.5, 62.1]] },

        // --- AFRICA ---
        { f:'SUDAN', t:'SAF ARMY', p:[[15.5, 32.5], [13.4, 25.1]] },
        { f:'SUDAN', t:'RSF FORCES', p:[[14.5, 31.0], [12.0, 24.0]] },
        { f:'DRC', t:'M23 REBELS', p:[[-4.3, 15.3], [-1.5, 29.3]] },
        { f:'DRC', t:'CODECO', p:[[1.5, 30.2], [2.1, 31.0]] },
        { f:'SOMALIA', t:'AL-SHABAAB', p:[[2.0, 45.3], [4.9, 46.5]] },
        { f:'MALI', t:'AZAWAD REBELS', p:[[12.6, -8.0], [18.2, -0.3]] },
        { f:'MALI', t:'JNIM TERROR', p:[[14.5, -4.2], [15.8, -1.5]] },
        { f:'NIGERIA', t:'BOKO HARAM', p:[[9.1, 7.5], [11.9, 13.2]] },
        { f:'NIGERIA', t:'ISWAP', p:[[12.0, 13.5], [13.1, 14.2]] },
        { f:'ETHIOPIA', t:'FANO AMHARA', p:[[9.0, 38.7], [11.3, 37.5]] },
        { f:'ETHIOPIA', t:'OLA OROMO', p:[[8.5, 39.2], [7.1, 37.0]] },
        { f:'BURKINA FASO', t:'IS-SAHEL', p:[[12.3, -1.5], [14.0, -1.0]] },
        { f:'NIGER', t:'JIHADISTS', p:[[13.5, 2.1], [15.2, 5.2]] },
        { f:'MOZAMBIQUE', t:'ASWJ ISIS', p:[[-13.0, 40.0], [-15.2, 39.5]] },
        { f:'CAMEROON', t:'ADF SEPARATISTS', p:[[3.8, 11.5], [5.9, 9.3]] },
        { f:'CHAD', t:'FACT REBELS', p:[[12.1, 15.0], [19.0, 18.0]] },

        { f:'MYANMAR', t:'NUG FORCES', p:[[19.7, 96.1], [22.2, 95.8]] },

        { f:'PHILIPPINES', t:'NPA GUERRILLA', p:[[14.6, 121.0], [12.2, 122.3]] },
        { f:'INDIA', t:'NAXAL REBELS', p:[[20.1, 80.2], [18.1, 81.6]] },
        { f:'THAILAND', t:'PATANI REBELS', p:[[13.7, 100.5], [6.6, 101.6]] },
        { f:'INDONESIA', t:'PAPUA REBELS', p:[[-2.5, 140.7], [-4.0, 138.0]] }
    ];

    const frozen = [
        { f:'RUSSIA', t:'GEORGIA', p:[[43.5, 39.5], [42.3, 42.0]] },
        { f:'N.KOREA', t:'S.KOREA', p:[[39.0, 125.7], [37.5, 127.0]] },
        { f:'CHINA', t:'TAIWAN', p:[[39.9, 116.4], [24.1, 121.1]] },
        { f:'MOLDOVA', t:'TRANSNISTRIA', p:[[47.0, 28.8], [46.8, 29.6]] },
        { f:'ARMENIA', t:'AZERBAIJAN', p:[[40.4, 49.8], [40.1, 44.5]] },
        { f:'CYPRUS', t:'TRNC', p:[[35.1, 33.3], [35.3, 33.8]] },
        { f:'SERBIA', t:'KOSOVO', p:[[44.8, 20.4], [42.6, 21.1]] },
        { f:'MOROCCO', t:'POLISARIO', p:[[27.1, -13.2], [24.2, -14.1]] },
        { f:'JAPAN', t:'RUSSIA (KURILS)', p:[[35.6, 139.6], [44.1, 146.1]] },
        { f:'INDIA', t:'PAKISTAN (KASHMIR)', p:[[28.6, 77.2], [34.2, 74.8]] },
        { f:'VENEZUELA', t:'GUYANA', p:[[10.5, -66.9], [6.8, -58.1]] },
        { f:'ARGENTINA', t:'UK (FALKLANDS)', p:[[-34.6, -58.4], [-51.7, -58.5]] }
    ];

    // სტატისტიკის ავტომატური სინქრონიზაცია რუკასთან
    document.getElementById('war-count').innerText = activeWars.length;
    document.getElementById('frz-count').innerText = frozen.length;

    function render(list, type) {
        list.forEach(c => {
            const isWar = type === 'war';
            const color = isWar ? '#ff0000' : '#0096ff';
            const labelClass = isWar ? 'label-red' : 'label-blue';

            L.polyline(c.p, { color: color, className: c.main ? 'war-line main-line' : 'war-line' }).addTo(map);

            const show = () => {
                document.getElementById('details').innerHTML = `<div class="strike-card" style="border-left-color:${color}"><h3>${c.f} ⚔️ ${c.t}</h3><p>სტატუსი: ${type.toUpperCase()}</p></div>`;
                document.getElementById('news-section').style.display = 'block';
                document.getElementById('news-wrap').innerHTML = `<iframe style="width:100%;height:100%;border:none" src="https://www.bing.com/news/search?q=${encodeURIComponent(c.f + ' ' + c.t + ' conflict 2026')}"></iframe>`;
            };

            L.marker(c.p[0], { icon: L.divIcon({ className: labelClass, html: c.f, iconSize: [null, null] }) }).addTo(map).on('click', show);
            L.marker(c.p[1], { icon: L.divIcon({ className: labelClass, html: c.t, iconSize: [null, null] }) }).addTo(map).on('click', show);
            L.polyline(c.p, { color: 'transparent', weight: 30, interactive: true }).addTo(map).on('click', show);
        });
    }

    render(activeWars, 'war');
    render(frozen, 'frozen');
</script>
</body>
</html>
